<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Pretendard, 'Noto Sans KR', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="112%" height="112%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2"/>
      <feFlood flood-color="#000" flood-opacity="0.08"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="340" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a" letter-spacing="2">KURO</text>
  <text x="480" y="50" text-anchor="middle" font-size="10" fill="#64748b">Kernel for Upstream Recombination Oligodesign</text>

  <!-- Step 1: INPUT -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="160" height="180" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="30" y="70" width="160" height="32" rx="8" fill="#3b82f6"/>
  <rect x="30" y="94" width="160" height="8" fill="#3b82f6"/>
  <text x="110" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">INPUT</text>
  <text x="110" y="122" text-anchor="middle" font-size="10" fill="#1e40af">GenBank (.gb)</text>
  <text x="110" y="140" text-anchor="middle" font-size="10" fill="#1e40af">SnapGene (.dna)</text>
  <line x1="60" y1="152" x2="160" y2="152" stroke="#bfdbfe" stroke-width="1"/>
  <text x="110" y="170" text-anchor="middle" font-size="10" fill="#1e40af">EVOLVEpro CSV</text>
  <text x="110" y="188" text-anchor="middle" font-size="10" fill="#1e40af">Manual text input</text>
  <line x1="60" y1="200" x2="160" y2="200" stroke="#bfdbfe" stroke-width="1"/>
  <text x="110" y="218" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">Auto gene detection</text>
  <text x="110" y="234" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">WT codon validation</text>

  <!-- Arrow 1→2 -->
  <line x1="194" y1="160" x2="218" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: PARSE -->
  <g filter="url(#shadow)">
    <rect x="222" y="70" width="160" height="180" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <rect x="222" y="70" width="160" height="32" rx="8" fill="#8b5cf6"/>
  <rect x="222" y="94" width="160" height="8" fill="#8b5cf6"/>
  <text x="302" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PARSE</text>
  <text x="302" y="122" text-anchor="middle" font-size="10" fill="#5b21b6">Mutation parsing</text>
  <text x="302" y="140" text-anchor="middle" font-size="10" fill="#5b21b6">Q232A → pos 232</text>
  <line x1="252" y1="152" x2="352" y2="152" stroke="#ddd6fe" stroke-width="1"/>
  <text x="302" y="170" text-anchor="middle" font-size="10" fill="#5b21b6">Codon strategy</text>
  <text x="302" y="188" text-anchor="middle" font-size="9" fill="#7c3aed">Min. changes / Optimal</text>
  <line x1="252" y1="200" x2="352" y2="200" stroke="#ddd6fe" stroke-width="1"/>
  <text x="302" y="218" text-anchor="middle" font-size="9" fill="#7c3aed" font-weight="600">Error feedback</text>
  <text x="302" y="234" text-anchor="middle" font-size="9" fill="#7c3aed" font-weight="600">Line-level validation</text>

  <!-- Arrow 2→3 -->
  <line x1="386" y1="160" x2="410" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: DESIGN -->
  <g filter="url(#shadow)">
    <rect x="414" y="70" width="160" height="180" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="414" y="70" width="160" height="32" rx="8" fill="#10b981"/>
  <rect x="414" y="94" width="160" height="8" fill="#10b981"/>
  <text x="494" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">DESIGN</text>
  <text x="494" y="122" text-anchor="middle" font-size="10" fill="#065f46">Overlap extension</text>
  <text x="494" y="140" text-anchor="middle" font-size="10" fill="#065f46">Tm 62/58/42 °C</text>
  <line x1="444" y1="152" x2="544" y2="152" stroke="#a7f3d0" stroke-width="1"/>
  <text x="494" y="170" text-anchor="middle" font-size="10" fill="#065f46">GC% 40-60%</text>
  <text x="494" y="188" text-anchor="middle" font-size="10" fill="#065f46">Off-target scan</text>
  <line x1="444" y1="200" x2="544" y2="200" stroke="#a7f3d0" stroke-width="1"/>
  <text x="494" y="218" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Hairpin / Homodimer</text>
  <text x="494" y="234" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Progressive tolerance</text>

  <!-- Arrow 3→4 -->
  <line x1="578" y1="160" x2="602" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: REVIEW -->
  <g filter="url(#shadow)">
    <rect x="606" y="70" width="160" height="180" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <rect x="606" y="70" width="160" height="32" rx="8" fill="#f59e0b"/>
  <rect x="606" y="94" width="160" height="8" fill="#f59e0b"/>
  <text x="686" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">REVIEW</text>
  <text x="686" y="122" text-anchor="middle" font-size="10" fill="#92400e">Candidate comparison</text>
  <text x="686" y="140" text-anchor="middle" font-size="10" fill="#92400e">Fwd / Rev swap</text>
  <line x1="636" y1="152" x2="736" y2="152" stroke="#fde68a" stroke-width="1"/>
  <text x="686" y="170" text-anchor="middle" font-size="10" fill="#92400e">Custom primer input</text>
  <text x="686" y="188" text-anchor="middle" font-size="10" fill="#92400e">Evaluate Tm/GC/OT</text>
  <line x1="636" y1="200" x2="736" y2="200" stroke="#fde68a" stroke-width="1"/>
  <text x="686" y="218" text-anchor="middle" font-size="9" fill="#d97706" font-weight="600">OT detail popover</text>
  <text x="686" y="234" text-anchor="middle" font-size="9" fill="#d97706" font-weight="600">HP detail popover</text>

  <!-- Arrow 4→5 -->
  <line x1="770" y1="160" x2="794" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: EXPORT -->
  <g filter="url(#shadow)">
    <rect x="798" y="70" width="136" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="798" y="70" width="136" height="32" rx="8" fill="#ef4444"/>
  <rect x="798" y="94" width="136" height="8" fill="#ef4444"/>
  <text x="866" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">EXPORT</text>
  <text x="866" y="122" text-anchor="middle" font-size="10" fill="#991b1b">TSV (all primers)</text>
  <text x="866" y="140" text-anchor="middle" font-size="10" fill="#991b1b">Excel (plate map)</text>
  <line x1="828" y1="152" x2="904" y2="152" stroke="#fecaca" stroke-width="1"/>
  <text x="866" y="170" text-anchor="middle" font-size="10" fill="#991b1b">96-well plate</text>
  <text x="866" y="188" text-anchor="middle" font-size="10" fill="#991b1b">Multi-plate</text>
  <line x1="828" y1="200" x2="904" y2="200" stroke="#fecaca" stroke-width="1"/>
  <text x="866" y="218" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">Workspace save</text>
  <text x="866" y="234" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">.kuro.json</text>

  <!-- Tech Stack Bar -->
  <rect x="30" y="274" width="904" height="44" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="293" text-anchor="middle" font-size="10" font-weight="700" fill="#475569" letter-spacing="1">TECH STACK</text>
  <text x="140" y="310" text-anchor="middle" font-size="9" fill="#64748b">Tauri v2</text>
  <text x="290" y="310" text-anchor="middle" font-size="9" fill="#64748b">React 19 + Zustand</text>
  <text x="440" y="310" text-anchor="middle" font-size="9" fill="#64748b">TanStack Table</text>
  <text x="590" y="310" text-anchor="middle" font-size="9" fill="#64748b">primer3-py</text>
  <text x="740" y="310" text-anchor="middle" font-size="9" fill="#64748b">Biopython</text>
  <text x="870" y="310" text-anchor="middle" font-size="9" fill="#64748b">openpyxl</text>

  <!-- Separator dots -->
  <circle cx="210" cy="308" r="2" fill="#cbd5e1"/>
  <circle cx="365" cy="308" r="2" fill="#cbd5e1"/>
  <circle cx="515" cy="308" r="2" fill="#cbd5e1"/>
  <circle cx="665" cy="308" r="2" fill="#cbd5e1"/>
  <circle cx="805" cy="308" r="2" fill="#cbd5e1"/>
</svg>
