[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kuma"
version = "0.02.00"
description = "kuma - integrated primer design (KURO) + NGS verification (mame) tool"
requires-python = ">=3.11"
dependencies = [
    "primer3-py==2.3.0",
    "biopython==1.84",
    "openpyxl==3.1.5",
    "pydantic>=2.0",
    "pandas>=2.0",
]

[project.optional-dependencies]
build = [
    "pyinstaller==6.16.0",
]

[project.scripts]
kuro = "kuma_core.kuro.cli:main"
mame = "kuma_core.mame.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["kuma_core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "python-core"]
