[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kuma"
version = "0.6.0"
description = "kuma - integrated primer design (KURO) + NGS verification (mame) tool"
requires-python = ">=3.11"
dependencies = [
    "primer3-py==2.3.0",
    "biopython==1.84",
    "openpyxl==3.1.5",
    "pydantic>=2.0",
    "pandas>=2.0",
    "python-calamine==0.6.2",
    "psutil>=5.9",
    # mappy is only used by mame raw_run alignment. Source-only sdist; needs
    # zlib + sse2neon toolchain to build, which the Windows / macOS-aarch64
    # GitHub runners do not provide. Restrict to Linux so the cross-platform
    # release build does not abort on a feature that is still WIP.
    'mappy==2.30; platform_system == "Linux"',
]

[project.optional-dependencies]
build = [
    "pyinstaller==6.16.0",
]
mame-raw = [
    # Force-install on platforms where mappy can build from source. Users on
    # Windows / macOS who want raw_run can pin a system zlib and add this.
    "mappy==2.30",
]

[project.scripts]
kuro = "kuma_core.kuro.cli:main"
mame = "kuma_core.mame.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["kuma_core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "python-core"]

[tool.pyright]
extraPaths = [".", "python-core"]
include = ["kuma_core", "python-core", "tests", "scripts"]
exclude = [
    "**/__pycache__",
    "**/.pytest_cache",
    "node_modules",
    "dist",
    "src-tauri/target",
    "python-core/build",
    "python-core/dist",
]
reportMissingImports = "warning"
reportUnusedParameter = "none"
