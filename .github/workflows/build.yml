name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-ext: .exe
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-ext: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar-ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      # --- System dependencies (Linux only) ---
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # --- Python + sidecar ---
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -e '.[build]'

      # --- Vendor minimap2 binary (must run BEFORE build_sidecar.py) ---
      # Windows: build minimap2 from source using MSYS2 + MinGW-w64 toolchain.
      # Official v2.30 releases do not ship a Windows exe; MinGW compile is the
      # supported cross-compile path (see notes/specs/2026-06-02-phase3-windows-minimap2.md).
      - name: Set up MSYS2 + MinGW-w64 (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-zlib
            make
            git

      - name: Build minimap2 from source (Windows / MinGW)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        env:
          # MSYS2 converts backslashes; pass workspace as MSYS path explicitly
          MSYS_WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v2.30 https://github.com/lh3/minimap2.git /tmp/minimap2-src
          cd /tmp/minimap2-src
          make -j$(nproc)
          # Convert Windows path to MSYS2 path (e.g. D:\workspace -> /d/workspace)
          WS_MSYS="$(cygpath -u "${MSYS_WORKSPACE}")"
          VENDOR_DIR="${WS_MSYS}/python-core/vendor/minimap2/windows-x64"
          mkdir -p "$VENDOR_DIR"
          cp minimap2.exe "$VENDOR_DIR/minimap2.exe"
          echo "minimap2 copied to $VENDOR_DIR"

      - name: Verify minimap2.exe version (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          EXE="python-core/vendor/minimap2/windows-x64/minimap2.exe"
          test -f "$EXE" || { echo "ERROR: minimap2.exe not found at $EXE"; exit 1; }
          VERSION=$("$EXE" --version 2>&1 | head -1)
          echo "minimap2 version: $VERSION"
          echo "$VERSION" | grep -E "^2\.30" || {
            echo "WARNING: expected 2.30, got: $VERSION"
          }

      # Linux / macOS: vendor-minimap2.py downloads prebuilt binaries.
      # The script auto-detects the current platform and fills the matching vendor/<plat>/ dir.
      - name: Vendor minimap2 binary (Linux / macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: python python-core/scripts/vendor-minimap2.py

      - name: Build sidecar
        run: python build_sidecar.py
        working-directory: python-core

      - name: Verify sidecar binaries
        shell: bash
        run: |
          KURO="src-tauri/binaries/kuro-sidecar-${{ matrix.target }}${{ matrix.sidecar-ext }}"
          MAME="src-tauri/binaries/mame-sidecar-${{ matrix.target }}${{ matrix.sidecar-ext }}"
          ls -la "$KURO" "$MAME"
          test -f "$KURO"
          test -f "$MAME"

      # --- Node.js ---
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate sidecar hash manifest
        run: node scripts/sidecar-hash.mjs
        shell: bash

      - name: Collect Node dependency licenses
        run: |
          pnpm licenses list --json --prod > pnpm-licenses.json
          node scripts/collect-node-licenses.mjs pnpm-licenses.json NOTICE-node.md
        shell: bash

      # --- Rust ---
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: src-tauri

      # --- License collection: Rust (after toolchain setup so cargo is available) ---
      - name: Install cargo-about
        run: cargo install cargo-about --locked
        shell: bash

      - name: Collect Rust dependency licenses
        run: cargo about generate -m Cargo.toml about.hbs > ../NOTICE-rust.md
        working-directory: src-tauri
        shell: bash

      - name: Collect Python dependency licenses
        run: |
          pip install pip-licenses
          pip-licenses --format=markdown --output-file NOTICE-python.md \
            --packages primer3-py biopython openpyxl pydantic pandas python-calamine edlib pyinstaller
        shell: bash

      - name: Build NOTICE.md and copy to Tauri resources
        run: node scripts/build-notice.mjs
        shell: bash

      # --- Build Tauri ---
      - name: Build Tauri app
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Post-bundle sidecar hash injection (Shape A) ---
      # `sidecar:hash` (run earlier) records unsigned hashes. `tauri build`
      # ad-hoc signs the sidecars on macOS, mutating bytes. This step rehashes
      # the post-signing binaries inside the bundle, writes the manifest into
      # the .app, re-seals the top-level signature, and regenerates the DMG.
      # On Linux/Windows it is a no-op (legacy manifest stays authoritative).
      - name: Inject post-bundle sidecar hash manifest
        run: node scripts/sidecar-hash-postbuild.mjs
        shell: bash

      # --- macOS ad-hoc signature verification ---
      - name: Verify macOS ad-hoc signature
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          APP=$(find src-tauri/target -maxdepth 6 -name "kuma.app" | head -1)
          test -n "$APP" || { echo "kuma.app not found"; exit 1; }
          codesign --verify --deep --strict --verbose=2 "$APP" || exit 1
          codesign --display --verbose=4 "$APP" 2>&1 | head -20

      # --- Rename artifacts to match 4-part GitHub tag ---
      # Tauri/Cargo enforce semver MAJOR.MINOR.PATCH, but the project tags
      # releases as v{A.B.C.D} per CLAUDE.md "Git Convention". Bundle file
      # names ship the 3-part Tauri version, which makes it hard to map an
      # installer back to the exact GitHub release. Append the 4th component
      # so installer file names equal the tag (minus the "v" prefix).
      - name: Rename bundle artifacts to 4-part tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: node scripts/rename-bundle-to-tag.mjs "${GITHUB_REF_NAME}"

      # --- Upload artifacts ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: kuma-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*
          retention-days: 14

  # --- Create GitHub Release (only on tags) ---
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
