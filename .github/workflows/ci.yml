name: CI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  python-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install -e . pytest

      - name: Run Python tests
        run: python -m pytest tests/ -v

  frontend-typecheck:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies (for sidecar models)
        run: pip install -e .

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Check generated TS models are up-to-date
        run: node scripts/gen-models.mjs --check

      - name: Cross-layer sync check
        run: node scripts/sync-check.mjs

      - name: Cross-layer groups co-evolve check
        run: node scripts/sync-check-groups.mjs

      - name: i18n hardcoded-Korean lint
        run: node scripts/i18n-lint.mjs

      - name: i18n en/ko key parity
        run: node scripts/i18n-parity.mjs

  rust-check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run build

      - name: Create sidecar stubs for Tauri context
        run: |
          mkdir -p src-tauri/binaries
          printf '#!/usr/bin/env sh\nexit 0\n' > src-tauri/binaries/kuro-sidecar-x86_64-unknown-linux-gnu
          printf '#!/usr/bin/env sh\nexit 0\n' > src-tauri/binaries/mame-sidecar-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/kuro-sidecar-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/mame-sidecar-x86_64-unknown-linux-gnu

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: src-tauri

      - name: Rust check
        run: cargo check
        working-directory: src-tauri
