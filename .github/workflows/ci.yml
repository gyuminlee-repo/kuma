name: CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx tsc --noEmit

  ui-smoke:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - run: pnpm run smoke:ui

  sidecar-package-check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install sidecar build dependencies
        run: pip install -e '.[build]'

      - name: Build sidecar bundle
        run: python python-core/build_sidecar.py --onefile

      - name: Verify sidecar binaries
        run: |
          test -f src-tauri/binaries/kuro-sidecar-x86_64-unknown-linux-gnu
          test -f src-tauri/binaries/mame-sidecar-x86_64-unknown-linux-gnu

  rust-check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Build frontend (required by tauri::generate_context)
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Create sidecar stubs for check
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/kuro-sidecar-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/mame-sidecar-x86_64-unknown-linux-gnu

      - name: Validate semver versions
        run: |
          node -e '
            const fs = require("fs");
            const re = /^\d+\.\d+\.\d+$/;
            const checks = [
              ["package.json", JSON.parse(fs.readFileSync("package.json","utf8")).version],
              ["src-tauri/tauri.conf.json", JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8")).version],
              ["src-tauri/Cargo.toml", fs.readFileSync("src-tauri/Cargo.toml","utf8").match(/^version\s*=\s*"(.+?)"/m)?.[1]],
              ["pyproject.toml", fs.readFileSync("pyproject.toml","utf8").match(/^version\s*=\s*"(.+?)"/m)?.[1]],
            ];
            let fail = false;
            for (const [file, ver] of checks) {
              if (!re.test(ver)) { console.error(`${file}: "${ver}" is not valid semver (expected X.Y.Z)`); fail = true; }
            }
            if (fail) process.exit(1);
            console.log("All versions valid:", checks.map(c => c[1]).join(", "));
          '

      - name: Cargo check
        run: cd src-tauri && cargo check
