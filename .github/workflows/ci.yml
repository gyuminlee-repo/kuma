name: CI — Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install primer3-py==2.3.0 biopython==1.84 openpyxl==3.1.5 pytest==9.0.2

      - name: Run tests
        run: python -m pytest tests/ -v
