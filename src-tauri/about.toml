# cargo-about configuration for KUMA
# https://embarkstudios.github.io/cargo-about/

# Accepted SPDX license identifiers. Crates under an accepted license are
# included in NOTICE-rust.md. A crate whose license is not listed here fails
# the build (no silent skip). Full license TEXT (not just the SPDX id) is
# emitted by the about.hbs template via {{text}}, so no extra config is needed.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
]
